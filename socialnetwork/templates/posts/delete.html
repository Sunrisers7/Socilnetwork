{% extends 'base.html' %}

{% block title %}Видалити пост{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <h2>Видалити пост?</h2>
        <p>Ви впевнені, що хочете видалити цей пост?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Видалити</button>
            <a href="{% url 'posts:feed' %}" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}
